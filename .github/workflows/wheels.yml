name: wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
          - os: macos-14
            target: universal2
            manylinux: auto
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust targets (macOS universal2)
        if: matrix.target == 'universal2'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # turbojpeg-sys builds libjpeg-turbo via CMake; disabling SIMD avoids NASM/YASM
          # toolchain requirements in manylinux release runners.
          CMAKE_ARGS: -DWITH_SIMD=0
        with:
          command: build
          args: --release --out dist --manifest-path crates/mx8-py/Cargo.toml
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            set -euxo pipefail
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y openssl-devel pkgconfig
            elif command -v yum >/dev/null 2>&1; then
              yum install -y openssl-devel pkgconfig
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y libssl-dev pkg-config
            fi
      - name: Install test (import)
        if: matrix.target == 'x86_64' || matrix.target == 'universal2'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install dist/*.whl
          python -c "import mx8; print('mx8_import_ok')"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: publish (PyPI)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Check PyPI token
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "PYPI_API_TOKEN missing; skipping publish."
          fi
      - name: Publish
        uses: PyO3/maturin-action@v1
        if: env.PYPI_API_TOKEN != ''
        env:
          MATURIN_PYPI_TOKEN: ${{ env.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*.whl
