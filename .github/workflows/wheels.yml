name: wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
          - os: macos-14
            target: universal2
            manylinux: auto
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust targets (macOS universal2)
        if: matrix.target == 'universal2'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Prepare bundled coordinator binary (macOS universal2)
        if: matrix.target == 'universal2'
        run: |
          set -euxo pipefail
          cargo build -p mx8-coordinator --release --target aarch64-apple-darwin
          cargo build -p mx8-coordinator --release --target x86_64-apple-darwin
          mkdir -p crates/mx8-py/python/mx8
          lipo -create \
            -output crates/mx8-py/python/mx8/mx8d-coordinator \
            target/aarch64-apple-darwin/release/mx8-coordinator \
            target/x86_64-apple-darwin/release/mx8-coordinator
          chmod +x crates/mx8-py/python/mx8/mx8d-coordinator
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # turbojpeg-sys builds libjpeg-turbo via CMake; disabling SIMD avoids NASM/YASM
          # toolchain requirements in manylinux release runners.
          CMAKE_ARGS: -DWITH_SIMD=0
        with:
          command: build
          args: --release --out dist --manifest-path crates/mx8-py/Cargo.toml
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            set -euxo pipefail
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y openssl-devel pkgconfig
            elif command -v yum >/dev/null 2>&1; then
              yum install -y openssl-devel pkgconfig
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y libssl-dev pkg-config
            fi
            mkdir -p crates/mx8-py/python/mx8
            cargo build -p mx8-coordinator --release
            COORD_BIN="$(find target -type f -name mx8-coordinator -path '*/release/*' | head -n1)"
            test -n "${COORD_BIN}"
            cp "${COORD_BIN}" crates/mx8-py/python/mx8/mx8d-coordinator
            chmod +x crates/mx8-py/python/mx8/mx8d-coordinator
      - name: Install test (import)
        if: matrix.target == 'x86_64' || matrix.target == 'universal2'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          WHEEL="$(ls dist/mx8-*-cp38-abi3-*.whl | head -n1)"
          test -n "${WHEEL}"
          python -m pip install "${WHEEL}"
          python -c "import mx8; print('mx8_import_ok')"
          python - <<'PY'
          import os
          import pathlib
          import mx8

          path = os.environ.get("MX8_COORDINATOR_BIN")
          print("coordinator_bin", path)
          assert path and pathlib.Path(path).is_file(), "bundled coordinator binary missing"
          with mx8.coordinator(timeout_secs=10, log=False) as coord:
              print("coordinator_ok", coord.url)
          PY
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  verify_aarch64:
    name: verify (ubuntu-arm64, aarch64 wheel)
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Download aarch64 wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest-aarch64
          path: dist
      - name: Install test (aarch64 coordinator)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          WHEEL="$(ls dist/mx8-*-cp38-abi3-*.whl | head -n1)"
          test -n "${WHEEL}"
          python -m pip install "${WHEEL}"
          python -c "import mx8; print('mx8_import_ok')"
          python - <<'PY'
          import os
          import pathlib
          import mx8

          path = os.environ.get("MX8_COORDINATOR_BIN")
          print("coordinator_bin", path)
          assert path and pathlib.Path(path).is_file(), "bundled coordinator binary missing"
          with mx8.coordinator(timeout_secs=10, log=False) as coord:
              print("coordinator_ok", coord.url)
          PY

  http_backend_gate:
    name: gate (http backend throughput)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run HTTP backend gate
        env:
          RUST_LOG: warn
        run: ./scripts/http_backend_gate.sh

  nvdec_fallback_gate:
    name: gate (nvdec fallback, no-gpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run NVDEC fallback validation profile
        env:
          MX8_NVDEC_VALIDATION_PROFILE: fallback
        run: ./scripts/video_nvdec_validation_report.sh

  publish:
    name: publish (PyPI)
    needs: [build, verify_aarch64, http_backend_gate, nvdec_fallback_gate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Check PyPI token
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "PYPI_API_TOKEN missing; skipping publish."
          fi
      - name: Publish
        uses: PyO3/maturin-action@v1
        if: env.PYPI_API_TOKEN != ''
        env:
          MATURIN_PYPI_TOKEN: ${{ env.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*.whl
